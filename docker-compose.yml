version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: b100-postgres
    environment:
      POSTGRES_DB: nifty100_warehouse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: b100-redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: b100-web
    command: sh -c "python django_app/manage.py migrate && python django_app/manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  celery_worker:
    build: .
    container_name: b100-celery-worker
    command: celery -A config.celery worker -l info
    working_dir: /app/django_app
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  celery_beat:
    build: .
    container_name: b100-celery-beat
    command: celery -A config.celery beat -l info
    working_dir: /app/django_app
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
