{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nifty 100 Intelligence</title>

    <style>
        /* Fallback styles when CDN resources are unavailable. */
        body { margin: 0; font-family: Arial, sans-serif; }
        .flex { display: flex; }
        .flex-1 { flex: 1; }
        .grid { display: grid; }
        .grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }
        .grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .gap-4 { gap: 1rem; }
        .gap-6 { gap: 1.5rem; }
        .w-full { width: 100%; }
        .w-64 { width: 16rem; }
        .w-40 { width: 10rem; }
        .h-screen { min-height: 100vh; }
        .p-2 { padding: 0.5rem; }
        .p-3 { padding: 0.75rem; }
        .p-4 { padding: 1rem; }
        .p-5 { padding: 1.25rem; }
        .p-6 { padding: 1.5rem; }
        .p-8 { padding: 2rem; }
        .px-2 { padding-left: 0.5rem; padding-right: 0.5rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .py-1 { padding-top: 0.25rem; padding-bottom: 0.25rem; }
        .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .mb-3 { margin-bottom: 0.75rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .mt-2 { margin-top: 0.5rem; }
        .mt-4 { margin-top: 1rem; }
        .mt-6 { margin-top: 1.5rem; }
        .mr-4 { margin-right: 1rem; }
        .rounded { border-radius: 0.25rem; }
        .rounded-lg { border-radius: 0.5rem; }
        .shadow { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .border { border: 1px solid #d1d5db; }
        .border-b { border-bottom: 1px solid #e5e7eb; }
        .overflow-hidden { overflow: hidden; }
        .text-left { text-align: left; }
        .text-center { text-align: center; }
        .text-sm { font-size: 0.875rem; }
        .text-lg { font-size: 1.125rem; }
        .text-2xl { font-size: 1.5rem; }
        .text-3xl { font-size: 1.875rem; }
        .font-bold { font-weight: 700; }
        .hidden { display: none; }
        .block { display: block; }
        .justify-between { justify-content: space-between; }
        .flex-wrap { flex-wrap: wrap; }
        .space-y-2 > * + * { margin-top: 0.5rem; }

        .bg-white { background-color: #ffffff; }
        .bg-black { background-color: #111827; }
        .bg-gray-50 { background-color: #f9fafb; }
        .bg-gray-100 { background-color: #f3f4f6; }
        .bg-gray-200 { background-color: #e5e7eb; }
        .bg-gray-900 { background-color: #111827; }
        .bg-blue-100 { background-color: #dbeafe; }
        .bg-green-100 { background-color: #dcfce7; }
        .bg-yellow-100 { background-color: #fef9c3; }
        .bg-red-100 { background-color: #fee2e2; }

        .text-white { color: #ffffff; }
        .text-gray-300 { color: #d1d5db; }
        .text-gray-500 { color: #6b7280; }
        .text-blue-700 { color: #1d4ed8; }
        .text-green-700 { color: #15803d; }
        .text-yellow-700 { color: #a16207; }
        .text-red-600 { color: #dc2626; }
        .text-red-700 { color: #b91c1c; }

        .hover\:bg-gray-700:hover { background-color: #374151; }
        .hover\:bg-gray-50:hover { background-color: #f9fafb; }

        .animate-pulse { animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        canvas { max-width: 100%; }

        @media (min-width: 768px) {
            .md\:grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .md\:col-span-2 { grid-column: span 2 / span 2; }
        }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gray-100 flex">

<!-- SIDEBAR -->
<div class="w-64 h-screen bg-gray-900 text-white p-5">

    <h1 class="text-2xl font-bold mb-6">Market AI</h1>

    <a href="/" class="block p-2 hover:bg-gray-700 rounded">
        <i class="fa fa-home"></i> Home
    </a>

    <a href="/companies/" class="block p-2 hover:bg-gray-700 rounded">
        <i class="fa fa-building"></i> Companies
    </a>

    <a href="/dashboard/" class="block p-2 hover:bg-gray-700 rounded">
        <i class="fa fa-chart-line"></i> Dashboard
    </a>

    <a href="/compare/" class="block p-2 hover:bg-gray-700 rounded">
        <i class="fa fa-code-compare"></i> Compare
    </a>

    <a href="/reports/" class="block p-2 hover:bg-gray-700 rounded">
        <i class="fa fa-file"></i> Reports
    </a>

    <a href="/profile/" class="block p-2 hover:bg-gray-700 rounded">
        <i class="fa fa-user"></i> Profile
    </a>

    <a href="/settings/" class="block p-2 hover:bg-gray-700 rounded">
        <i class="fa fa-gear"></i> Settings
    </a>

</div>

<!-- MAIN -->
<div class="flex-1">

    <!-- TOP BAR -->
    <div class="bg-white p-4 shadow flex justify-between">

        <h2 class="font-bold text-lg">
            {% block title %}Dashboard{% endblock %}
        </h2>

        <div>
            <i class="fa fa-bell mr-4"></i>
            <i class="fa fa-user"></i>
        </div>

    </div>

    <!-- PAGE CONTENT -->
    <div class="p-6">

        {% block content %}
        {% endblock %}

    </div>

</div>

</body>
</html>
