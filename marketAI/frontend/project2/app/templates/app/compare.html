{% extends 'app/base.html' %}

{% block title %}Compare{% endblock %}

{% block content %}
<div class="bg-white p-4 rounded shadow mb-4">
	<h2 class="font-bold mb-2">Compare Companies</h2>
	<p class="text-sm text-gray-500 mb-4">Enter comma-separated symbols like TCS,INFY,HDFCBANK or leave blank for top 5.</p>

	<form id="compareForm" class="flex flex-wrap gap-3">
		<input id="symbolsInput" type="text" class="border p-2 rounded w-64" placeholder="TCS,INFY,HDFCBANK" />
		<button class="bg-black text-white px-4 rounded" type="submit">Compare</button>
	</form>

	<div id="compareError" class="hidden text-sm text-red-600 mt-3">Failed to load compare data.</div>
</div>

<div class="bg-white rounded shadow overflow-hidden">
	<table class="w-full text-left">
		<thead class="bg-gray-100">
			<tr>
				<th class="p-3">Symbol</th>
				<th class="p-3">Company</th>
				<th class="p-3">Sector</th>
				<th class="p-3">Revenue</th>
				<th class="p-3">Profit</th>
				<th class="p-3">Health</th>
				<th class="p-3">Profit Margin %</th>
			</tr>
		</thead>
		<tbody id="compareBody">
			<tr class="animate-pulse"><td class="p-3" colspan="7"><div class="h-4 bg-gray-100 rounded"></div></td></tr>
			<tr class="animate-pulse"><td class="p-3" colspan="7"><div class="h-4 bg-gray-100 rounded"></div></td></tr>
			<tr class="animate-pulse"><td class="p-3" colspan="7"><div class="h-4 bg-gray-100 rounded"></div></td></tr>
		</tbody>
	</table>
</div>

<script>
const compareForm = document.getElementById('compareForm');
const symbolsInput = document.getElementById('symbolsInput');
const compareBody = document.getElementById('compareBody');
const compareError = document.getElementById('compareError');

async function loadCompare(symbols = '') {
	try {
		compareError.classList.add('hidden');
		const query = symbols ? `?symbols=${encodeURIComponent(symbols)}` : '';
		const response = await fetch(`/api/compare/${query}`);
		if (!response.ok) {
			throw new Error('Unable to fetch compare data');
		}

		const payload = await response.json();
		const rows = payload.results || [];

		if (!rows.length) {
			compareBody.innerHTML = '<tr><td class="p-3 text-gray-500" colspan="7">No companies found.</td></tr>';
			return;
		}

		compareBody.innerHTML = rows.map(row => `
			<tr class="border-b hover:bg-gray-50">
				<td class="p-3 font-bold">${row.symbol}</td>
				<td class="p-3">${row.name}</td>
				<td class="p-3">${row.sector}</td>
				<td class="p-3">₹ ${Number(row.revenue).toLocaleString()}</td>
				<td class="p-3">₹ ${Number(row.profit).toLocaleString()}</td>
				<td class="p-3">${Number(row.health).toFixed(1)}</td>
				<td class="p-3">${Number(row.profit_margin).toFixed(2)}%</td>
			</tr>
		`).join('');
	} catch (error) {
		compareError.classList.remove('hidden');
		compareBody.innerHTML = '<tr><td class="p-3 text-gray-500" colspan="7">No compare data available.</td></tr>';
		console.error(error);
	}
}

compareForm.addEventListener('submit', function (event) {
	event.preventDefault();
	const symbols = symbolsInput.value.trim();
	loadCompare(symbols);
});

const initialSymbols = new URLSearchParams(window.location.search).get('symbols') || '';
symbolsInput.value = initialSymbols;
loadCompare(initialSymbols);
</script>
{% endblock %}
