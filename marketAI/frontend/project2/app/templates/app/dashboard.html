{% extends 'app/base.html' %}

{% block title %}Market Analytics Dashboard{% endblock %}

{% block content %}

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- REVENUE CHART -->
    <div class="bg-white p-4 rounded shadow">
        <h2 class="font-bold mb-2">Revenue Analysis</h2>
        <div id="revenueError" class="hidden text-sm text-red-600">Failed to load revenue chart.</div>
        <div id="revenueLoading" class="space-y-2">
            <div class="h-3 bg-gray-200 rounded animate-pulse"></div>
            <div class="h-32 bg-gray-100 rounded animate-pulse"></div>
        </div>
        <canvas id="revenueChart"></canvas>
    </div>

    <!-- PROFIT CHART -->
    <div class="bg-white p-4 rounded shadow">
        <h2 class="font-bold mb-2">Profit Analysis</h2>
        <div id="profitError" class="hidden text-sm text-red-600">Failed to load profit chart.</div>
        <div id="profitLoading" class="space-y-2">
            <div class="h-3 bg-gray-200 rounded animate-pulse"></div>
            <div class="h-32 bg-gray-100 rounded animate-pulse"></div>
        </div>
        <canvas id="profitChart"></canvas>
    </div>

    <!-- HEALTH DISTRIBUTION -->
    <div class="bg-white p-4 rounded shadow md:col-span-2">

    <h2 class="font-bold mb-2">Health Distribution</h2>

    <div id="healthError" class="hidden text-sm text-red-600 text-center">Failed to load health chart.</div>
    <div id="healthLoading" class="space-y-2">
        <div class="h-3 bg-gray-200 rounded animate-pulse"></div>
        <div class="h-32 bg-gray-100 rounded animate-pulse"></div>
    </div>

    <!-- SMALL CHART CONTAINER -->
    <div style="width: 300px; height: 300px; margin: auto;">
        <canvas id="healthChart"></canvas>
    </div>

</div>

</div>

<!-- CHART.JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const revenueLoading = document.getElementById('revenueLoading');
const profitLoading = document.getElementById('profitLoading');
const healthLoading = document.getElementById('healthLoading');
const revenueError = document.getElementById('revenueError');
const profitError = document.getElementById('profitError');
const healthError = document.getElementById('healthError');

async function loadDashboard() {
    try {
        if (typeof Chart === 'undefined') {
            throw new Error('Chart.js failed to load');
        }

        const response = await fetch('/api/dashboard/');
        if (!response.ok) {
            throw new Error('Failed to load dashboard data');
        }

        const payload = await response.json();

        revenueLoading?.remove();
        profitLoading?.remove();
        healthLoading?.remove();

        new Chart(document.getElementById('revenueChart'), {
            type: 'bar',
            data: {
                labels: payload.labels,
                datasets: [{
                    label: 'Revenue',
                    data: payload.revenue
                }]
            }
        });

        new Chart(document.getElementById('profitChart'), {
            type: 'line',
            data: {
                labels: payload.labels,
                datasets: [{
                    label: 'Profit',
                    data: payload.profit
                }]
            }
        });

        new Chart(document.getElementById('healthChart'), {
            type: 'doughnut',
            data: {
                labels: payload.health_labels,
                datasets: [{
                    data: payload.health_counts
                }]
            }
        });
    } catch (error) {
        revenueLoading?.remove();
        profitLoading?.remove();
        healthLoading?.remove();
        revenueError?.classList.remove('hidden');
        profitError?.classList.remove('hidden');
        healthError?.classList.remove('hidden');
        if (revenueError) {
            revenueError.textContent = 'Failed to load revenue chart. Check internet for Chart.js CDN.';
        }
        if (profitError) {
            profitError.textContent = 'Failed to load profit chart. Check internet for Chart.js CDN.';
        }
        if (healthError) {
            healthError.textContent = 'Failed to load health chart. Check internet for Chart.js CDN.';
        }
        console.error(error);
    }
}

loadDashboard();

</script>

{% endblock %}
